<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brycee Trades</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <div>
        <h1>Brycee Trades</h1>
        <small>Professional Trading Dashboard</small>
    </div>

    <button id="loginBtn">Login with Deriv</button>
</header>

<div class="stats">

    <div class="stat-card">
        <h4>Balance</h4>
        <h2 id="accountBalance">$0.00</h2>
    </div>

    <div class="stat-card">
        <h4>Market</h4>
        <h2>R_100</h2>
    </div>

    <div class="stat-card">
        <h4>Status</h4>
        <h2 id="status">🟢 Live</h2>
    </div>

</div>

<main>

<section class="left-panel">

    <div class="card">

        <h2>Live Digit</h2>

        <div id="tick" class="live-digit">
            -
        </div>

    </div>

    <div class="card">

        <h2>Trade Type</h2>

        <select id="tradeType">
            <option>Matches / Differs</option>
            <option>Over / Under</option>
            <option>Rise / Fall</option>
            <option>Higher / Lower</option>
        </select>

        <br><br>

        <button id="buyBtn">
            BUY
        </button>

    </div>

</section>

<section class="right-panel">

    <div class="card">

        <h2>Digit Analysis</h2>

        <div id="analysis">

        </div>

    </div>

    <div class="card">

        <h2>Trade Signals</h2>

        <div id="signals">

            Waiting for analysis...

        </div>

    </div>

</section>

</main>

<script src="auth.js"></script>
<script src="app.js"></script>

</body>
</html>
