<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brycee Trades</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <div>
        <h1>Brycee Trades</h1>
        <small>Professional Trading Dashboard</small>
    </div>

    <button id="loginBtn">Login with Deriv</button>
</header>

<div class="stats">

    <div class="stat-card">
        <h4>Balance</h4>
        <h2 id="accountBalance">$0.00</h2>
    </div>

    <div class="stat-card">
        <h4>Market</h4>
        <select id="marketSelect"></select>
    </div>

    <div class="stat-card">
        <h4>Status</h4>
        <h2 id="status">🟠 Disconnected</h2>
    </div>

</div>

<main>

<section class="left-panel">

    <div class="card">
        <h2>Live Digit</h2>
        <div id="tick" class="live-digit">-</div>
    </div>

    <div class="card">
        <h2>Trade Setup</h2>

        <label class="field-label">Trade Type</label>
        <select id="tradeCategory">
            <option value="callput_natural">Rise / Fall</option>
            <option value="callput_barrier">Higher / Lower</option>
            <option value="matchdiff">Matches / Differs</option>
            <option value="overunder">Over / Under</option>
            <option value="evenodd">Even / Odd</option>
        </select>

        <label class="field-label">Direction</label>
        <select id="tradeDirection"></select>

        <div id="predictionRow" class="field-row" style="display:none">
            <label class="field-label">Prediction Digit (0-9)</label>
            <input type="number" id="predictionDigit" min="0" max="9" value="5">
        </div>

        <div id="barrierRow" class="field-row" style="display:none">
            <label class="field-label">Barrier Offset</label>
            <input type="text" id="barrierOffset" value="+0.50">
        </div>

        <label class="field-label">Stake (USD)</label>
        <input type="number" id="stake" min="0.35" step="0.01" value="1">

        <label class="field-label">Duration</label>
        <div class="duration-row">
            <input type="number" id="duration" min="1" value="5">
            <select id="durationUnit">
                <option value="t">Ticks</option>
                <option value="s">Seconds</option>
                <option value="m">Minutes</option>
            </select>
        </div>

        <button id="buyBtn">PLACE TRADE</button>
    </div>

</section>

<section class="right-panel">

    <div class="card">
        <h2>Digit Analysis</h2>
        <div id="analysis"></div>
    </div>

    <div class="card">
        <h2>Trade Signals</h2>
        <div id="signals">Waiting for analysis...</div>
    </div>

    <div class="card">
        <h2>Open Positions</h2>
        <div id="openPositions">
            <p class="empty-msg">No open positions</p>
        </div>
    </div>

    <div class="card">
        <h2>Trade History</h2>
        <div id="tradeHistory">
            <p class="empty-msg">No trades yet</p>
        </div>
    </div>

</section>

</main>

</body>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
<script src="trading.js"></script>
</html>
