<!DOCTYPE html>
<html>
<head>
    <title>Brycee Trades</title>
    </head>

    <body>

    <h1>Brycee Trades</h1>

    <button onclick="connectDeriv()">
        Connect Deriv Account
        </button>

        <p id="status"></p>

        <script>

        function connectDeriv() {
            const appId = "33yMrZBIMziNyVi9bMf2r";

                window.location.href =
                        "https://oauth.deriv.com/oauth2/authorize?app_id=" + appId;
                        }

                        const params = new URLSearchParams(window.location.search);

                        if (
                            params.get("token1") ||
                                params.get("acct1") ||
                                    window.location.hash
                                    ) {
                                        document.getElementById("status").innerHTML =
                                                "✅ Deriv account connected successfully!";
                                                }

                                                </script>

                                                </body>
