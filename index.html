<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard</title></head>
<body style="font-family:Arial; text-align:center; padding:20px; background:#f5f5f5;">

<h1>Brycee Trades</h1>

<div id="loginSection">
  <p>Connect your Deriv account</p>
    <button onclick="login()" style="padding:15px 30px; background:#0057ff; color:white; border:none; border-radius:8px;">Login</button>
    </div>

    <div id="accountInfo" style="display:none; margin-top:20px;">
      <h3>Account: <span id="loginid"></span></h3>
        <p>Currency: <span id="currency"></span></p>
          <h2>Balance: <span id="balance">0.00</span></h2>
            <p id="status"></p>
              
                <div style="margin-top:30px;">
                    <a href="trading.html"><button>Trade</button></a>
                        <a href="portfolio.html"><button>Portfolio</button></a>
                            <a href="markets.html"><button>Markets</button></a>
                                <button onclick="logout()">Logout</button>
                                  </div>
                                  </div>

                                  <script src="app.js"></script>
                                  <script>
                                  function login() {
                                    const url = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=read,trade&response_type=token`;
                                      location.href = url;
                                      }

                                      // Check token on load
                                      window.onload = () => {
                                        const hash = location.hash.substring(1);
                                          if (hash) {
                                              const t = new URLSearchParams(hash).get('token1');
                                                  if (t) { localStorage.setItem('deriv_token', t); location.hash = ""; location.reload(); }
                                                    }
                                                      if (localStorage.getItem('deriv_token')) {
                                                          document.getElementById("loginSection").style.display = "none";
                                                              document.getElementById("accountInfo").style.display = "block";
                                                                }
                                                                }
                                                                </script>
                                                                </body></html>
