<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bryce Trades</title>
<style>
  body { font-family: Arial, sans-serif; background:#0e0e0e; color:#fff; text-align:center; padding:40px; }
  #loginBtn { background:#ff444f; color:#fff; border:none; padding:14px 24px; border-radius:8px; font-size:16px; cursor:pointer; }
  #balance { font-size:28px; margin:20px 0; }
  .hidden { display:none; }
</style>
</head>
<body>

<h1>Bryce Trades</h1>
<div id="balance">Balance: ---.--- USD</div>
<button id="loginBtn">Log in with Deriv</button>
<button id="logoutBtn" class="hidden">Log out</button>

<script>
const APP_ID = '33zqFdSUnH9jY0bjdm8Vn'; // Your app_id
const REDIRECT_URI = 'https://bryceetrades.vercel.app/'; // MUST match Deriv settings

// 1. Login button
document.getElementById('loginBtn').onclick = () => {
  const url = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=read,trade`;
  window.location.href = url;
};

// 2. Get token from URL after Deriv redirects back
const params = new URLSearchParams(window.location.hash.substring(1));
const token = params.get('token1'); // Demo token
const token2 = params.get('token2'); // Real token

if (token || token2) {
  localStorage.setItem('deriv_token', token || token2);
  localStorage.setItem('deriv_account_type', token ? 'demo' : 'real');
  // Clean URL so token doesn't show
  window.history.replaceState({}, document.title, "/");
  initApp();
} else if (localStorage.getItem('deriv_token')) {
  initApp();
}

// 3. Logout
document.getElementById('logoutBtn').onclick = () => {
  localStorage.clear();
  window.location.href = REDIRECT_URI;
};

function initApp() {
  document.getElementById('loginBtn').classList.add('hidden');
  document.getElementById('logoutBtn').classList.remove('hidden');
  
  const ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=' + APP_ID);
  
  ws.onopen = () => {
    ws.send(JSON.stringify({
      authorize: localStorage.getItem('deriv_token')
    }));
  };
  
  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    if (data.msg_type === 'authorize') {
      document.getElementById('balance').textContent = 
        `Balance: ${data.authorize.balance.toFixed(2)} ${data.authorize.currency}`;
    }
    if (data.msg_type === 'balance') {
      document.getElementById('balance').textContent = 
        `Balance: ${data.balance.toFixed(2)} ${data.balance.currency}`;
    }
  };
}
</script>
</body>
</html>
