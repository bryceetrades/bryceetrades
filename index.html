<body>

    <div id="balanceBox">
      <div>Account Balance</div>
      <div id="balance">Loading...</div>

<script>
  const APP_ID = "33zqFdSUnH9jY0bjdm8Vn";

  // 1. Grab token from URL after Deriv redirects back
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  if (token) {
    document.querySelector('.btn').style.display = 'none';
    document.getElementById('balanceBox').style.display = 'block';
    getBalance(token);
  }

  // 2. Call Deriv API to get balance
  async function getBalance(token) {
    try {

      ws.onopen = () => {
        ws.send(JSON.stringify({ authorize: token }));
      };

          showErr(data.error.message);

          return;
