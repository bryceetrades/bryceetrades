<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bryce E Trades</title>
  <style>
    body { font-family: system-ui, sans-serif; background:#0f172a; color:#e2e8f0; text-align:center; padding:40px; }
    .card { background:#1e293b; padding:24px; border-radius:16px; max-width:400px; margin:0 auto; }
    .btn { display:inline-block; background:#22d3ee; color:#0f172a; padding:12px 20px; border-radius:12px; text-decoration:none; font-weight:700; margin-top:12px; }
    .balance { font-size:28px; font-weight:800; margin:12px 0; }
    .muted { color:#94a3b8; font-size:14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Bryce E Trades</h1>
    <div class="muted">Account Balance</div>
    <div class="balance" id="balance">--.-- USD</div>
    <div id="auth-area">
      <a class="btn" href="https://oauth.deriv.com/oauth2/authorize?app_id=33zqFdSUnH9jY0bjdm8Vn&redirect_uri=https://bryceetrades.vercel.app">Log in with Deriv</a>
    </div>
  </div>

  <script>
    const APP_ID = "33zqFdSUnH9jY0bjdm8Vn";
    const balanceEl = document.getElementById('balance');
    const authArea = document.getElementById('auth-area');

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (token) {
      localStorage.setItem('deriv_token', token);
      window.history.replaceState({}, document.title, "/");
    }

    const storedToken = localStorage.getItem('deriv_token');

    if (storedToken) {
      authArea.innerHTML = `<a class="btn" onclick="logout()">Log out</a>`;
      getBalance(storedToken);
    }

    async function getBalance(token) {
      try {
        const ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);
        
        ws.onopen = () => {
          ws.send(JSON.stringify({ authorize: token }));
        };

        ws.onmessage = (msg) => {
          const data = JSON.parse(msg.data);
          
          if (data.error) {
            balanceEl.textContent = "Auth failed";
            console.error(data.error);
            return;
          }

          if (data.msg_type === 'authorize') {
            ws.send(JSON.stringify({ balance: 1 }));
          }

          if (data.msg_type === 'balance') {
            const bal = data.balance;
            const currency = data.balance.currency;
            balanceEl.textContent = `${bal} ${currency}`;
            ws.close();
          }
        };

      } catch (e) {
        balanceEl.textContent = "Error";
        console.error(e);
      }
    }

    function logout() {
      localStorage.removeItem('deriv_token');
      location.reload();
    }
  </script>
</body>
</html>
