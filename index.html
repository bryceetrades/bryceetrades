<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trade - Brycee Trades</title>
<style>
body{background:#0b0b12;color:#fff;font-family:-apple-system,Arial;margin:0;padding:15px}
button{border:none;border-radius:10px;padding:12px;cursor:pointer;font-weight:600}
.tab-btn{background:#1c1c2e;color:#aaa;margin-right:6px}
.tab-btn.active{background:#0057ff;color:#fff}
.card{background:#151521;border-radius:15px;padding:15px;margin-top:15px}
select,input{background:#1c1c2e;border:1px solid #2a2a3a;color:#fff;border-radius:8px;padding:10px;width:100%;margin-top:5px}
.digit-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:15px 0}
.digit-btn{background:#1c1c2e;color:#fff;padding:15px;border-radius:8px;font-size:18px}
.digit-btn.active{background:#0057ff}
.digit-btn span{font-size:12px;display:block;color:#888;margin-top:3px}
.buy-btn{background:#0057ff;width:100%;padding:18px;font-size:16px;margin-top:15px;color:#fff}
#price{font-size:40px;font-weight:700;text-align:center;margin:20px 0}
#lastDigit{color:#0057ff}
.toggle{background:#1c1c2e;border-radius:8px;padding:4px;display:flex}
.toggle button{flex:1;background:transparent;color:#aaa}
.toggle button.active{background:#0057ff;color:#fff}
</style>
</head>
<body>

<a href="index.html" style="color:#0057ff;text-decoration:none">← Back</a>
<h2>Trade</h2>

<!-- Trade type tabs -->
<div>
  <button class="tab-btn active" onclick="setType('DIGITMATCH')">Matches/Differs</button>
    <button class="tab-btn" onclick="setType('DIGITOVER')">Over/Under</button>
      <button class="tab-btn" onclick="setType('DIGITEVEN')">Even/Odd</button>
        <button class="tab-btn" onclick="setType('CALL')">Rise/Fall</button>
        </div>

        <div class="card">
          <!-- Symbol dropdown -->
            <label>Symbol</label>
              <select id="symbol" onchange="changeSymbol()">
                  <option value="R_10">Volatility 10 Index</option>
                      <option value="R_25">Volatility 25 Index</option>
                          <option value="R_50">Volatility 50 Index</option>
                              <option value="R_75">Volatility 75 Index</option>
                                  <option value="R_100" selected>Volatility 100 Index</option>
                                      <option value="R_200">Volatility 200 Index</option>
                                          <option value="R_300">Volatility 300 Index</option>
                                              <option value="frxEURUSD">EURUSD</option>
                                                  <option value="frxGBPUSD">GBPUSD</option>
                                                    </select>

                                                      <!-- Live price -->
                                                        <div id="price">---.<span id="lastDigit">-</span></div>
                                                          <div style="text-align:center;color:#888;font-size:14px">Last Digit: <span id="digitDisplay">-</span></div>

                                                            <!-- Digits 0-9 - hide for Rise/Fall -->
                                                              <div id="digitSection">
                                                                  <div style="margin-top:20px;color:#888;font-size:14px">Last digit prediction</div>
                                                                      <div class="digit-grid" id="digitGrid"></div>
                                                                          
                                                                              <!-- Matches/Differs toggle -->
                                                                                  <div class="toggle" id="matchToggle">
                                                                                        <button class="active" onclick="setMatch('MATCH')">Matches</button>
                                                                                              <button onclick="setMatch('DIFF')">Differs</button>
                                                                                                  </div>
                                                                                                    </div>

                                                                                                      <!-- Stake + Duration -->
                                                                                                        <div style="display:flex;gap:10px;margin-top:15px">
                                                                                                            <div style="flex:1">
                                                                                                                  <label>Stake</label>
                                                                                                                        <input id="stake" type="number" value="10">
                                                                                                                            </div>
                                                                                                                                <div style="flex:1">
                                                                                                                                      <label>Duration</label>
                                                                                                                                            <input id="duration" type="number" value="5">
                                                                                                                                                  <div style="font-size:12px;color:#888">Ticks</div>
                                                                                                                                                      </div>
                                                                                                                                                        </div>

                                                                                                                                                          <!-- Prediction text -->
                                                                                                                                                            <div class="card" style="margin-top:15px;font-size:14px">
                                                                                                                                                                <div style="color:#888">Prediction</div>
                                                                                                                                                                    <div id="predictionText">Last digit will match 5</div>
                                                                                                                                                                        <div style="margin-top:8px;color:#888">Payout</div>
                                                                                                                                                                            <div id="payoutText
