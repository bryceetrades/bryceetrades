<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deriv Login</title>
  <style>
    body { font-family: system-ui, sans-serif; display: grid; place-items: center; height: 100vh; margin: 0; background: #0e0e0e; color: #fff; }
    .box { text-align: center; padding: 40px; background: #1a1a1a; border-radius: 12px; max-width: 400px; }
    button { padding: 14px 28px; font-size: 16px; border: 0; border-radius: 8px; background: #ff444f; color: #fff; cursor: pointer; font-weight: 600; }
    button:hover { background: #e63e47; }
    #status { margin-top: 20px; font-size: 14px; word-break: break-all; }
    code { background: #333; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Deriv App</h1>
    <button id="loginBtn">Login with Deriv</button>
    <div id="status"></div>
  </div>

  <script>
    // ===== ONLY EDIT THESE 2 LINES IF NEEDED =====
    const APP_ID = '33zqFdSUnH9jY0bjdm8Vn'; 
    const REDIRECT_URI = 'https://bryceetrades-kimsmercy496-2389s-projects.vercel.app';
    // ==============================================

    const DERIV_URL = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
    
    const btn = document.getElementById('loginBtn');
    const status = document.getElementById('status');

    // Step 1: Click button = go to Deriv
    btn.onclick = () => window.location.href = DERIV_URL;

    // Step 2: When Deriv sends you back with ?code=...
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error_description') || params.get('error');

    if (error) {
      status.innerHTML = `❌ Deriv Error: ${error}`;
      btn.style.display = 'none';
    } else if (code) {
      status.innerHTML = `✅ Login Success!<br><br>Your Code: <code>${code}</code><br><br>This is what you send to backend to get token.`;
      btn.style.display = 'none';
      // Clean the ugly URL
      window.history.replaceState({}, '', '/');
    } else {
      status.innerHTML = 'Click the button to login with Deriv + 2FA';
    }
  </script>
</body>
</html>
