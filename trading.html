<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trade - Brycee Trades</title>
<style>
body{background:#0b0b12;color:#fff;font-family:-apple-system,Arial;margin:0;padding:15px}
button{border:none;border-radius:10px;padding:12px;cursor:pointer;font-weight:600}
.tab-btn{background:#1c1c2e;color:#aaa;margin-right:6px;font-size:13px;margin-bottom:6px}
.tab-btn.active{background:#0057ff;color:#fff}
.card{background:#151521;border-radius:15px;padding:15px;margin-top:15px}
select,input{background:#1c1c2e;border:1px solid #2a2a3a;color:#fff;border-radius:8px;padding:10px;width:100%;margin-top:5px}
.digit-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:15px 0}
.digit-btn{background:#1c1c2e;color:#fff;padding:15px;border-radius:8px;font-size:18px}
.digit-btn.active{background:#0057ff}
.buy-btn{background:#0057ff;width:100%;padding:18px;font-size:16px;margin-top:15px;color:#fff}
#price{font-size:40px;font-weight:700;text-align:center;margin:20px 0}
#lastDigit{color:#0057ff}
.toggle{background:#1c1c2e;border-radius:8px;padding:4px;display:flex;margin-top:10px}
.toggle button{flex:1;background:transparent;color:#aaa}
.toggle button.active{background:#0057ff;color:#fff}
a{color:#0057ff;text-decoration:none}
.trade-row{background:#1c1c2e;border-radius:10px;padding:10px;margin-top:8px;font-size:13px;display:flex;justify-content:space-between}
.trade-row .pl{font-weight:700}
.pl.pos{color:#4cd964} .pl.neg{color:#ff3b30}
#status{font-size:14px;text-align:center;margin-top:10px}
</style>
</head>
<body>

<a href="index.html">← Back</a>
<h2>Trade</h2>

<div>
  <button class="tab-btn active" onclick="setType('DIGITMATCH')">Match</button>
    <button class="tab-btn" onclick="setType('DIGITDIFF')">Differs</button>
      <button class="tab-btn" onclick="setType('DIGITOVER')">Over</button>
        <button class="tab-btn" onclick="setType('DIGITUNDER')">Under</button>
          <button class="tab-btn" onclick="setType('DIGITEVEN')">Even</button>
            <button class="tab-btn" onclick="setType('DIGITODD')">Odd</button>
              <button class="tab-btn" onclick="setType('CALL')">Rise</button>
                <button class="tab-btn" onclick="setType('PUT')">Fall</button>
                  <button class="tab-btn" onclick="setType('DIGITHIGH')">Higher</button>
                    <button class="tab-btn" onclick="setType('DIGITLOW')">Lower</button>
                    </div>

                    <div class="card">
                      <label>Symbol</label>
                        <select id="symbol" onchange="changeSymbol()">
                            <option value="R_10">Vol 10</option>
                                <option value="R_25">Vol 25</option>
                                    <option value="R_50">Vol 50</option>
                                        <option value="R_75">Vol 75</option>
                                            <option value="R_100" selected>Vol 100</option>
                                                <option value="R_200">Vol 200</option>
                                                    <option value="R_300">Vol 300</option>
                                                        <option value="frxEURUSD">EURUSD</option>
                                                            <option value="frxGBPUSD">GBPUSD</option>
                                                              </select>

                                                                <div id="price">---.<span id="lastDigit">-</span></div>
                                                                  <div style="text-align:center;color:#888;font-size:14px">Last Digit: <span id="digitDisplay">-</span></div>

                                                                    <div id="digitSection">
                                                                        <div style="margin-top:20px;color:#888;font-size:14px">Last digit prediction</div>
                                                                            <div class="digit-grid" id="digitGrid"></div>
                                                                              </div>

                                                                                <div style="display:flex;gap:10px;margin-top:15px">
                                                                                    <div style="flex:1">
                                                                                          <label>Stake USD</label>
                                                                                                <input id="stake" type="number" value="10" oninput="getProposal()">
                                                                                                    </div>
                                                                                                        <div style="flex:1">
                                                                                                              <label>Duration</label>
                                                                                                                    <input id="duration" type="number" value="5" oninput="getProposal()">
                                                                                                                          <div style="font-size:12px;color:#888">Ticks</div>
                                                                                                                              </div>
                                                                                                                                </div>

                                                                                                                                  <div class="card" style="margin-top:15px;font-size:14px">
                                                                                                                                      <div style="color:#888">Prediction</div>
                                                                                                                                          <div id="predictionText">Last digit will match 5</div>
                                                                                                                                              <div style="margin-top:8px;color:#888">Payout</div>
                                                                                                                                                  <div id="payoutText" style="font-size:20px;font-weight:700">-- USD</div>
                                                                                                                                                    </div>

                                                                                                                                                      <button class="buy-btn" id="buyBtn" onclick="buyTrade()">Buy @ -- USD</button>
                                                                                                                                                        <div id="status"></div>
                                                                                                                                                        </div>

                                                                                                                                                        <div class="card">
                                                                                                                                                          <h3 style="margin:0 0 10px 0">Active Trades <span id="tradeCount" style="color:#888;font-size:14px">0</span></h3>
                                                                                                                                                            <div id="activeTrades">No active trades</div>
                                                                                                                                                            </div>

                                                                                                                                                            <script src="app.js"></script>
                                                                                                                                                            <script>
                                                                                                                                                            if (!token) location.href = "index.html";

                                                                                                                                                            let currentType = 'DIGITMATCH';
                                                                                                                                                            let selectedDigit = 5;
                                                                                                                                                            let currentSymbol = 'R_100';
                                                                                                                                                            let currentPrice = 0;
                                                                                                                                                            let proposalId = null;
                                                                                                                                                            let proposalPrice = 0;

                                                                                                                                                            function buildDigits() {
                                                                                                                                                              const grid = document.getElementById('digitGrid');
                                                                                                                                                                grid.innerHTML = '';
                                                                                                                                                                  for(let i=0; i<10; i++) {
                                                                                                                                                                      grid.innerHTML += `<button class="digit-btn ${i==5?'active':''}" onclick="selectDigit(${i})">${i}</button>`;
                                                                                                                                                                        }
                                                                                                                                                                        }
                                                                                                                                                                        buildDigits();

                                                                                                                                                                        window.onTick = (tick) => {
                                                                                                                                                                          currentPrice = tick.quote;
                                                                                                                                                                            let priceStr = currentPrice.toFixed(2);
                                                                                                                                                                              let lastDigit = priceStr.slice(-1);
                                                                                                                                                                                document.getElementById('price').innerHTML = priceStr.slice(0,-1) + '.<span id="lastDigit">' + lastDigit + '</span>';
                                                                                                                                                                                  document.getElementById('digitDisplay').innerText = lastDigit;
                                                                                                                                                                                    updatePrediction();
                                                                                                                                                                                    };

                                                                                                                                                                                    window.onProposal = (p) => {
                                                                                                                                                                                      proposalId = p.id;
                                                                                                                                                                                        proposalPrice = p.ask_price;
                                                                                                                                                                                          document.getElementById('payoutText').innerText = p.payout + ' USD';
                                                                                                                                                                                            document.getElementById('buyBtn').innerText = `Buy @ ${p.ask_price} USD`;
                                                                                                                                                                                            };

                                                                                                                                                                                            function setType(type) {
                                                                                                                                                                                              currentType = type;
                                                                                                                                                                                                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                                                                                                                                                                                                  event.target.classList.add('active');
                                                                                                                                                                                                    document.getElementById('digitSection').style.display = type.includes('DIGIT') ? 'block' : 'none';
                                                                                                                                                                                                      updatePrediction();
                                                                                                                                                                                                        getProposal();
                                                                                                                                                                                                        }

                                                                                                                                                                                                        function selectDigit(d) {
                                                                                                                                                                                                          selectedDigit = d;
                                                                                                                                                                                                            document.querySelectorAll('.digit-btn').forEach(b => b.classList.remove('active'));
                                                                                                                                                                                                              document.querySelectorAll('.digit-btn')[d].classList.add('active');
                                                                                                                                                                                                                updatePrediction();
                                                                                                                                                                                                                  getProposal();
                                                                                                                                                                                                                  }

                                                                                                                                                                                                                  function changeSymbol() {
                                                                                                                                                                                                                    currentSymbol = document.getElementById('symbol').value;
                                                                                                                                                                                                                      if (ws && ws.readyState === 1) {
                                                                                                                                                                                                                          ws.send(JSON.stringify({ forget_all: "ticks" }));
                                                                                                                                                                                                                              ws.send(JSON.stringify({ ticks: currentSymbol, subscribe: 1 }));
                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                function updatePrediction() {
                                                                                                                                                                                                                                  let text = '';
                                                                                                                                                                                                                                    if (currentType === 'CALL') text = 'Price will RISE';
                                                                                                                                                                                                                                      if (currentType === 'PUT') text = 'Price will FALL';
                                                                                                                                                                                                                                        if (currentType === 'DIGITHIGH') text = `Last digit > ${selectedDigit}`;
                                                                                                                                                                                                                                          if (currentType === 'DIGITLOW') text = `Last digit < ${selectedDigit}`;
                                                                                                                                                                                                                                            if (currentType === 'DIGITMATCH') text = `Last digit = ${selectedDigit}`;
                                                                                                                                                                                                                                              if (currentType === 'DIGITDIFF') text = `Last digit ≠ ${selectedDigit}`;
                                                                                                                                                                                                                                                if (currentType === 'DIGITOVER') text = `Last digit > ${selectedDigit}`;
                                                                                                                                                                                                                                                  if (currentType === 'DIGITUNDER') text = `Last digit < ${selectedDigit}`;
                                                                                                                                                                                                                                                    if (currentType === 'DIGITEVEN') text = `Last digit is EVEN`;
                                                                                                                                                                                                                                                      if (currentType === 'DIGITODD') text = `Last digit is ODD`;
                                                                                                                                                                                                                                                        document.getElementById('predictionText').innerText = text;
                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                        function getProposal() {
                                                                                                                                                                                                                                                          let req = {
                                                                                                                                                                                                                                                              proposal: 1,
                                                                                                                                                                                                                                                                  amount: document.getElementById('stake').value,
                                                                                                                                                                                                                                                                      basis: "stake",
                                                                                                                                                                                                                                                                          contract_type: currentType,
                                                                                                                                                                                                                                                                              currency: CURRENCY,
                                                                                                                                                                                                                                                                                  duration: document.getElementById('duration').value,
                                                                                                                                                                                                                                                                                      duration_unit: "t",
                                                                                                                                                                                                                                                                                          symbol: currentSymbol
                                                                                                                                                                                                                                                                                            };
                                                                                                                                                                                                                                                                                              if (currentType.includes('DIGIT')) req.barrier = selectedDigit;
                                                                                                                                                                                                                                                                                                ws.send(JSON.stringify(req));
                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                function buyTrade() {
                                                                                                                                                                                                                                                                                                  if (!proposalId) return;
                                                                                                                                                                                                                                                                                                    ws.send(JSON.stringify({ buy: proposalId, price: proposalPrice }));
                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                    function renderPortfolio(contracts) {
                                                                                                                                                                                                                                                                                                      const el = document.getElementById('activeTrades');
                                                                                                                                                                                                                                                                                                        document.getElementById('tradeCount').innerText = contracts.length;
                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                            if (contracts.length === 0) {
                                                                                                                                                                                                                                                                                                                el.innerHTML = 'No active trades';
                                                                                                                                                                                                                                                                                                                    return;
                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                          el.innerHTML = contracts.map(c => {
                                                                                                                                                                                                                                                                                                                              const pl = c.bid_price - c.buy_price;
                                                                                                                                                                                                                                                                                                                                  return `<div class="trade-row">
                                                                                                                                                                                                                                                                                                                                        <div>${c.symbol} ${c.contract_type}<br><span style="color:#888;font-size:11px">ID: ${c.contract_id}</span></div>
                                                                                                                                                                                                                                                                                                                                              <div class="pl ${pl>=0?'pos':'neg'}">${pl>=0?'+':''}${pl.toFixed(2)}</div>
                                                                                                                                                                                                                                                                                                                                                  </div>`;
                                                                                                                                                                                                                                                                                                                                                    }).join('');
                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                    </script>
                                                                                                                                                                                                                                                                                                                                                    </body></html>
